<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>X Downloader 管理</title>
  <link rel="stylesheet" href="/dashboard.css">
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">LOCAL HELPER</p>
        <h1>X Downloader</h1>
      </div>
      <div class="top-actions">
        <span id="connection-badge" class="badge muted">等待连接</span>
        <label class="compact-field">自动刷新
          <select id="refresh-interval">
            <option value="0">关闭</option>
            <option value="2">2 秒</option>
            <option value="5" selected>5 秒</option>
            <option value="10">10 秒</option>
            <option value="30">30 秒</option>
          </select>
        </label>
        <button id="refresh" type="button">刷新</button>
      </div>
    </header>

    <section id="auth-panel" class="auth-panel">
      <div>
        <h2>连接本机 Helper</h2>
        <p>输入浏览器扩展正在使用的配对令牌。令牌只保存在当前标签页。</p>
      </div>
      <div class="auth-row">
        <input id="token" type="password" autocomplete="off" placeholder="配对令牌">
        <button id="connect" type="button">连接</button>
      </div>
    </section>

    <nav class="tabs" aria-label="页面区域">
      <button class="tab active" data-view="overview" type="button">概览</button>
      <button class="tab" data-view="tasks" type="button">任务</button>
      <button class="tab" data-view="history" type="button">历史</button>
      <button class="tab" data-view="settings" type="button">设置</button>
      <button class="tab" data-view="tags" type="button">标签</button>
    </nav>

    <main>
      <section id="view-overview" class="view active">
        <div id="summary-cards" class="metrics"></div>
        <div class="two-column">
          <article class="panel">
            <div class="panel-heading"><h2>最近 30 天</h2><span id="stats-time" class="subtle"></span></div>
            <div id="daily-chart" class="bar-chart"></div>
          </article>
          <article class="panel">
            <div class="panel-heading"><h2>常见错误</h2></div>
            <div id="error-ranking" class="ranking empty">暂无数据</div>
          </article>
        </div>
        <div class="three-column">
          <article class="panel"><div class="panel-heading"><h2>常见作者</h2></div><div id="author-ranking" class="ranking empty">暂无数据</div></article>
          <article class="panel"><div class="panel-heading"><h2>常用标签</h2></div><div id="tag-ranking" class="ranking empty">暂无数据</div></article>
          <article class="panel"><div class="panel-heading"><h2>分辨率</h2></div><div id="resolution-ranking" class="ranking empty">暂无数据</div></article>
        </div>
        <article class="panel">
          <div class="panel-heading"><h2>活动任务</h2><span id="active-count" class="subtle"></span></div>
          <div id="active-jobs" class="job-list empty">当前没有活动任务</div>
        </article>
      </section>

      <section id="view-tasks" class="view">
        <article class="panel">
          <div class="panel-heading">
            <div><h2>任务记录</h2><p>分页显示全部任务，适合长期积累的数据。</p></div>
            <form id="task-filter" class="task-filter">
              <input id="task-query" type="search" placeholder="搜索文件名或媒体 ID">
              <select id="task-status">
                <option value="">全部状态</option>
                <option value="queued">等待中</option>
                <option value="downloading">下载中</option>
                <option value="completed">已完成</option>
                <option value="failed">失败</option>
                <option value="cancelled">已取消</option>
              </select>
              <button type="submit">筛选</button>
            </form>
          </div>
          <div id="jobs" class="job-list empty">暂无任务</div>
          <button id="jobs-more" class="secondary hidden more-button" type="button">加载更多</button>
        </article>
      </section>

      <section id="view-history" class="view">
        <article class="panel">
          <form id="history-filter" class="filter-row">
            <input id="history-query" type="search" placeholder="搜索作者、帖子 ID、备注或文件名">
            <select id="history-status">
              <option value="">全部状态</option>
              <option value="completed">已完成</option>
              <option value="failed">失败</option>
              <option value="queued">等待中</option>
              <option value="downloading">下载中</option>
            </select>
            <select id="history-tag"><option value="">全部标签</option></select>
            <button type="submit">搜索</button>
          </form>
          <div id="history" class="history-list empty">暂无历史</div>
          <button id="history-more" class="secondary hidden" type="button">加载更多</button>
        </article>
      </section>

      <section id="view-settings" class="view">
        <article class="panel settings-panel">
          <div class="panel-heading"><div><h2>下载配置</h2><p>修改后立即应用于新任务。</p></div></div>
          <label>下载目录
            <div class="inline-row"><input id="download-dir" type="text"><button id="pick-directory" class="secondary" type="button">选择…</button></div>
          </label>
          <label>文件命名模板<input id="filename-template" type="text" maxlength="512"></label>
          <div class="two-field">
            <label>下载并发数<select id="concurrency"><option>1</option><option>2</option><option>3</option><option>4</option></select></label>
            <label>失败重试次数<select id="retry-count"><option>0</option><option>1</option><option>2</option><option>3</option><option>4</option><option>5</option></select></label>
          </div>
          <div class="form-actions"><button id="save-settings" type="button">保存配置</button><span id="settings-status" class="subtle"></span></div>
        </article>
      </section>

      <section id="view-tags" class="view">
        <article class="panel">
          <div class="panel-heading"><div><h2>标签管理</h2><p>标签应用于帖子历史条目及其全部视频。</p></div></div>
          <form id="tag-form" class="tag-form">
            <input id="tag-name" type="text" maxlength="64" placeholder="新标签名称" required>
            <input id="tag-color" type="color" value="#1d9bf0" aria-label="标签颜色">
            <button type="submit">添加标签</button>
          </form>
          <div id="tags" class="tag-list empty">暂无标签</div>
        </article>
      </section>
    </main>

    <p id="message" class="message" role="status" aria-live="polite"></p>
  </div>
  <script src="/dashboard.js"></script>
</body>
</html>
